<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mi Armario</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
<link rel="stylesheet" href="/static/style.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

.armario-header { display:flex; align-items:center; justify-content:space-between; padding:18px 32px; }
.armario-header h1 { font-family:'Playfair Display',serif; font-size:1.85rem; font-weight:700; color:#ffffff; }
.seccion { padding:0 32px 36px; }
.seccion h2 {
    font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:600;
    padding-bottom:10px; border-bottom:2px solid #F5E8ED;
    margin-bottom:18px; display:flex; align-items:center; gap:8px; color:#3D1F2E;
}
.seccion h2 .conteo { font-family:'DM Sans',sans-serif; font-size:.88rem; font-weight:400; color:#9A8A84; }
.galeria { display:grid; grid-template-columns:repeat(auto-fill,158px); gap:16px; }
.galeria img {
    width:158px; height:158px; object-fit:contain; cursor:pointer;
    border-radius:12px; border:2px solid transparent; transition:.22s;
    background:#FAF7F5; max-width:none; margin:0;
}
.galeria img:hover { transform:scale(1.06); border-color:#D4A0B0; box-shadow:0 6px 20px rgba(109,46,70,.18); }
.vacia { color:#C0B4AE; font-size:.9rem; font-style:italic; padding:8px 0; }

/* ── Modal overlay ── */
.modal {
    display:none; position:fixed; inset:0;
    background:rgba(28,20,16,.65); align-items:center; justify-content:center;
    z-index:100; backdrop-filter:blur(4px);
}
.modal-content {
    background:#F3EFE8; border-radius:16px; padding:24px; text-align:center;
    max-width:400px; width:92%; box-shadow:0 24px 64px rgba(0,0,0,.22);
    border:1px solid #EAE4DE; max-height:92vh; overflow-y:auto;
}

/* Image card */
.modal-img-card {
    display:inline-block; background:white; border-radius:12px;
    padding:14px; margin-bottom:14px; border:1px solid #E8E2DB;
}
.modal-img-card img {
    width:200px; height:200px; object-fit:contain; border-radius:8px;
    display:block; max-width:none; margin:0;
}

/* Category label */
.modal-cat {
    font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:600;
    color:#3D1F2E; margin-bottom:14px;
    display:flex; align-items:center; justify-content:center; gap:6px;
}

/* ── Metadata section ── */
.modal-meta { text-align:left; border-top:1px solid #E4DDD5; padding-top:12px; margin-bottom:16px; }
.meta-fila {
    display:flex; align-items:center; justify-content:space-between;
    padding:9px 0; border-bottom:0.5px solid #EDE6DE; gap:10px;
}
.meta-fila:last-child { border-bottom:none; }
.meta-fila.col-dir { flex-direction:column; align-items:flex-start; gap:8px; }
.meta-etiq {
    font-size:.84rem; color:#7A6E68; font-weight:500;
    font-family:'DM Sans',sans-serif; flex-shrink:0; min-width:72px;
}
.meta-sel {
    font-family:'DM Sans',sans-serif; font-size:.84rem; color:#1C1410;
    border:1px solid #DDD6CF; border-radius:8px; padding:6px 10px;
    background:white; cursor:pointer; outline:none; flex:1;
}
.meta-sel:focus { border-color:#6D2E46; }

/* Tag pills */
.tags-grp { display:flex; gap:5px; flex-wrap:wrap; }
.tag-p {
    padding:4px 10px; border-radius:20px; font-size:.77rem; cursor:pointer;
    border:1.5px solid #DDD6CF; color:#7A6E68; background:white;
    transition:.12s; user-select:none; font-family:'DM Sans',sans-serif;
    display:inline-flex; align-items:center; gap:4px;
}
.tag-p.on { background:#6D2E46; color:white; border-color:#6D2E46; }

/* Stars */
.stars { display:flex; gap:3px; }
.star { font-size:22px; cursor:pointer; color:#D8D0C8; transition:.1s; line-height:1; }
.star.on { color:#DAA520; }
.star:hover { transform:scale(1.15); }

/* Color circles */
.col-wrap { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.col-dot {
    width:26px; height:26px; border-radius:50%;
    border:2px solid rgba(0,0,0,.1); position:relative;
    cursor:pointer; flex-shrink:0;
}
.col-dot-x {
    display:none; position:absolute; inset:0; align-items:center;
    justify-content:center; font-size:11px; font-weight:700;
    color:rgba(255,255,255,.9); background:rgba(0,0,0,.28); border-radius:50%;
}
.col-dot:hover .col-dot-x { display:flex; }
.btn-add-col {
    width:26px; height:26px; border-radius:50%; border:1.5px dashed #C0B4AE;
    background:white; cursor:pointer; font-size:16px; color:#9A8A84;
    display:inline-flex; align-items:center; justify-content:center;
    margin:0; padding:0; transition:.15s; flex-shrink:0;
}
.btn-add-col:hover { border-color:#6D2E46; color:#6D2E46; }
.col-picker-row { display:none; align-items:center; gap:8px; flex-wrap:wrap; padding-top:4px; }
.col-picker-row.vis { display:flex; }

/* Modal buttons */
.modal-btns { display:flex; gap:10px; justify-content:center; }
.modal-btns button { flex:1; max-width:150px; }
.btn-guardar {
    background:linear-gradient(135deg,#6D2E46,#A0455F); color:white;
    border:none; padding:11px 20px; border-radius:30px;
    font-family:'DM Sans',sans-serif; font-size:.9rem; cursor:pointer;
    transition:opacity .2s; margin:0;
}
.btn-guardar:hover { opacity:.88; }
.close { float:right; font-size:1.5rem; cursor:pointer; color:#9A8A84; }
.close:hover { color:#6D2E46; }
</style>
</head>

<body>
<header>
    <div class="armario-header">
        <h1>Mi Armario</h1>
        <button onclick="window.location.href='/'">← Volver</button>
    </div>
</header>

<div id="contenido"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal()">&times;</span>

        <div class="modal-img-card">
            <img id="imgModal">
        </div>

        <div class="modal-cat" id="modalCat"></div>

        <div class="modal-meta">

            <div class="meta-fila col-dir">
                <span class="meta-etiq">Estación</span>
                <div class="tags-grp" id="mEstacion">
                    <span class="tag-p" data-val="primavera" onclick="toggleTag(this)"><i data-lucide="flower-2" width="13" height="13"></i> Primavera</span>
                    <span class="tag-p" data-val="verano"    onclick="toggleTag(this)"><i data-lucide="sun"      width="13" height="13"></i> Verano</span>
                    <span class="tag-p" data-val="otono"     onclick="toggleTag(this)"><i data-lucide="leaf"     width="13" height="13"></i> Otoño</span>
                    <span class="tag-p" data-val="invierno"  onclick="toggleTag(this)"><i data-lucide="snowflake" width="13" height="13"></i> Invierno</span>
                </div>
            </div>

            <div class="meta-fila col-dir">
                <span class="meta-etiq">Ocasión</span>
                <div class="tags-grp" id="mOcasion">
                    <span class="tag-p" data-val="trabajo"  onclick="toggleTag(this)"><i data-lucide="briefcase" width="13" height="13"></i> Trabajo</span>
                    <span class="tag-p" data-val="casual"   onclick="toggleTag(this)"><i data-lucide="sun"       width="13" height="13"></i> Casual</span>
                    <span class="tag-p" data-val="cita"     onclick="toggleTag(this)"><i data-lucide="heart"     width="13" height="13"></i> Cita</span>
                    <span class="tag-p" data-val="formal"   onclick="toggleTag(this)"><i data-lucide="sparkles"  width="13" height="13"></i> Formal</span>
                    <span class="tag-p" data-val="deporte"  onclick="toggleTag(this)"><i data-lucide="zap"       width="13" height="13"></i> Deporte</span>
                    <span class="tag-p" data-val="viaje"    onclick="toggleTag(this)"><i data-lucide="plane"     width="13" height="13"></i> Viaje</span>
                </div>
            </div>

            <div class="meta-fila">
                <span class="meta-etiq">Material</span>
                <select class="meta-sel" id="mMaterial">
                    <option value="">Sin especificar</option>
                    <option value="algodon">Algodón</option>
                    <option value="denim">Denim</option>
                    <option value="poliester">Poliéster</option>
                    <option value="lana">Lana</option>
                    <option value="seda">Seda</option>
                    <option value="lino">Lino</option>
                    <option value="cuero">Cuero</option>
                    <option value="sintetico">Sintético</option>
                    <option value="otro">Otro</option>
                </select>
            </div>

            <div class="meta-fila">
                <span class="meta-etiq">Valoración</span>
                <div class="stars" id="mStars">
                    <span class="star" onclick="valorarModal(1)">★</span>
                    <span class="star" onclick="valorarModal(2)">★</span>
                    <span class="star" onclick="valorarModal(3)">★</span>
                    <span class="star" onclick="valorarModal(4)">★</span>
                    <span class="star" onclick="valorarModal(5)">★</span>
                </div>
            </div>

            <div class="meta-fila col-dir">
                <span class="meta-etiq">Colores</span>
                <div class="col-wrap" id="mColors"></div>
                <div class="col-picker-row" id="mPickerRow">
                    <input type="color" id="mColorPicker" value="#888888"
                           style="width:32px;height:32px;border-radius:6px;border:1px solid #DDD6CF;cursor:pointer;padding:0">
                    <button type="button" onclick="confirmarColorModal()"
                            style="padding:4px 12px;font-size:.78rem;border-radius:20px;margin:0">Añadir</button>
                    <button type="button" onclick="cancelarPickerCol()"
                            style="padding:4px 12px;font-size:.78rem;border-radius:20px;background:#F5F0EC;color:#7A6E68;border:none;margin:0">Cancelar</button>
                </div>
            </div>

        </div>

        <div class="modal-btns">
            <button class="btn-eliminar" onclick="eliminarPrenda()">Eliminar</button>
            <button class="btn-guardar" onclick="guardarMeta()">Guardar</button>
        </div>
    </div>
</div>

<script>
const CATS = [
    { id:"top",      label:"Tops y camisetas", icon:"shirt" },
    { id:"pantalon", label:"Pantalones",        icon:"layers" },
    { id:"vestido",  label:"Vestidos",          icon:"star" },
    { id:"falda",    label:"Faldas",            icon:"triangle" },
    { id:"short",    label:"Shorts",            icon:"square" },
    { id:"otro",     label:"Otros",             icon:"more-horizontal" }
];

let seleccionActual = "";
let valoracionModal = 0;
let coloresModal    = [];

window.onload = function(){
    fetch("/prendas")
    .then(res => res.json())
    .then(data => renderArmario(data));
};

function renderArmario(data){
    const cont = document.getElementById("contenido");
    cont.innerHTML = "";

    const total = CATS.reduce((s, c) => s + (data[c.id]||[]).length, 0);

    if(total === 0){
        cont.innerHTML = `<div style="text-align:center;padding:60px;color:#bbb;">
            <div style="margin-bottom:12px"><i data-lucide="shirt" width="48" height="48" style="color:#bbb"></i></div>
            <p>Tu armario está vacío.</p>
            <p>Sube prendas desde la página principal.</p>
        </div>`;
        lucide.createIcons();
        return;
    }

    CATS.forEach(cat => {
        const imgs = data[cat.id] || [];
        const sec = document.createElement("div");
        sec.className = "seccion";
        sec.innerHTML = `
            <h2><i data-lucide="${cat.icon}" width="18" height="18"></i> ${cat.label}
                <span class="conteo">${imgs.length} prenda${imgs.length !== 1 ? "s" : ""}</span>
            </h2>
            <div class="galeria" id="g-${cat.id}">
                ${imgs.length === 0 ? '<span class="vacia">Sin prendas en esta categoría</span>' : ""}
            </div>`;
        cont.appendChild(sec);

        imgs.forEach(ruta => {
            const img = document.createElement("img");
            img.src = ruta + "?" + Date.now();
            img.onclick = () => abrirModal(ruta, cat);
            document.getElementById("g-" + cat.id).appendChild(img);
        });
    });
    lucide.createIcons();
}

function abrirModal(ruta, cat){
    seleccionActual = ruta;
    document.getElementById("imgModal").src = ruta + "?" + Date.now();
    document.getElementById("modalCat").innerHTML =
        `<i data-lucide="${cat.icon}" width="14" height="14"></i> ${cat.label}`;

    // Reset fields
    valoracionModal = 0;
    coloresModal    = [];
    resetTags("mEstacion");
    resetTags("mOcasion");
    document.getElementById("mMaterial").value = "";
    renderStars(0);
    renderColores();
    document.getElementById("mPickerRow").classList.remove("vis");

    fetch("/meta_prendas")
    .then(r => r.json())
    .then(meta => {
        const m = meta[ruta];
        if(m){
            if(m.estacion) m.estacion.split(",").forEach(v => activateTag("mEstacion", v.trim()));
            if(m.ocasion)  m.ocasion.split(",").forEach(v => activateTag("mOcasion",  v.trim()));
            document.getElementById("mMaterial").value = m.material || "";
            valoracionModal = parseInt(m.valoracion) || 0;
            renderStars(valoracionModal);
            if(m.color){
                const hexes  = m.color.split(",");
                const nombres = (m.color_nombre || "").split(",");
                coloresModal = hexes.map((h, i) => ({
                    hex:    h.trim(),
                    nombre: (nombres[i] || "").trim() || h.trim()
                }));
                renderColores();
            }
        }
        document.getElementById("modal").style.display = "flex";
        lucide.createIcons();
    })
    .catch(() => {
        document.getElementById("modal").style.display = "flex";
        lucide.createIcons();
    });
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

document.getElementById("modal").addEventListener("click", function(e){
    if(e.target === this) cerrarModal();
});

// ── Tag helpers ──
function toggleTag(el){ el.classList.toggle("on"); }
function resetTags(id){ document.querySelectorAll(`#${id} .tag-p`).forEach(p => p.classList.remove("on")); }
function activateTag(id, val){ const el = document.querySelector(`#${id} .tag-p[data-val="${val}"]`); if(el) el.classList.add("on"); }
function getActiveTags(id){ return [...document.querySelectorAll(`#${id} .tag-p.on`)].map(p => p.dataset.val).join(","); }

// ── Star rating ──
function valorarModal(n){ valoracionModal = n; renderStars(n); }
function renderStars(n){
    document.querySelectorAll("#mStars .star").forEach((s, i) => s.classList.toggle("on", i < n));
}

// ── Color circles ──
function renderColores(){
    const wrap = document.getElementById("mColors");
    wrap.innerHTML = "";
    coloresModal.forEach((c, i) => {
        const dot = document.createElement("div");
        dot.className = "col-dot";
        dot.style.background = c.hex;
        dot.title = c.nombre;
        dot.innerHTML = `<div class="col-dot-x" onclick="quitarColor(${i})">×</div>`;
        wrap.appendChild(dot);
    });
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "btn-add-col";
    btn.title = "Añadir color";
    btn.textContent = "+";
    btn.onclick = mostrarPickerCol;
    wrap.appendChild(btn);
}

function quitarColor(i){ coloresModal.splice(i, 1); renderColores(); }
function mostrarPickerCol(){ document.getElementById("mPickerRow").classList.add("vis"); }
function cancelarPickerCol(){ document.getElementById("mPickerRow").classList.remove("vis"); }
function confirmarColorModal(){
    const hex = document.getElementById("mColorPicker").value;
    coloresModal.push({ hex, nombre: hex });
    renderColores();
    cancelarPickerCol();
}

// ── Eliminar prenda ──
function eliminarPrenda(){
    let fd = new FormData();
    fd.append("ruta", seleccionActual);
    fetch("/eliminar", { method:"POST", body:fd })
    .then(res => res.json())
    .then(() => {
        cerrarModal();
        fetch("/prendas").then(r => r.json()).then(d => renderArmario(d));
    });
}

// ── Guardar metadatos ──
function guardarMeta(){
    const fd = new FormData();
    fd.append("ruta",         seleccionActual);
    fd.append("estacion",     getActiveTags("mEstacion"));
    fd.append("ocasion",      getActiveTags("mOcasion"));
    fd.append("material",     document.getElementById("mMaterial").value);
    fd.append("valoracion",   valoracionModal);
    fd.append("color",        coloresModal.map(c => c.hex).join(","));
    fd.append("color_nombre", coloresModal.map(c => c.nombre).join(","));

    fetch("/actualizar_meta", { method:"POST", body:fd })
    .then(r => r.json())
    .then(data => {
        if(data.ok) cerrarModal();
        else alert("Error al guardar: " + (data.error || "desconocido"));
    })
    .catch(() => alert("No se pudo guardar."));
}
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
</body>
</html>
